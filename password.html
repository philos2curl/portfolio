<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jerel Smith — Portfolio Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0F172A;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 32px 80px rgba(0,0,0,0.4);
  }
  .monogram {
    width: 52px;
    height: 52px;
    background: #1D4ED8;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 18px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -.02em;
  }
  .name {
    font-size: 19px;
    font-weight: 800;
    color: #0F172A;
    letter-spacing: -.02em;
    margin-bottom: 6px;
  }
  .role {
    font-size: 13px;
    color: #64748B;
    margin-bottom: 32px;
    line-height: 1.5;
  }
  .divider {
    height: 1px;
    background: #E2E8F0;
    margin: 0 0 28px;
  }
  .label {
    font-size: 12px;
    font-weight: 600;
    color: #475569;
    text-align: left;
    margin-bottom: 8px;
    letter-spacing: .03em;
  }
  input[type="password"] {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #E2E8F0;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    color: #0F172A;
    outline: none;
    transition: border-color .15s;
    margin-bottom: 12px;
  }
  input[type="password"]:focus { border-color: #1D4ED8; }
  .error {
    font-size: 12px;
    color: #DC2626;
    text-align: left;
    margin-bottom: 12px;
    display: none;
  }
  .error.visible { display: block; }
  button[type="submit"] {
    width: 100%;
    padding: 13px;
    background: #1D4ED8;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background .15s;
  }
  button[type="submit"]:hover { background: #1E40AF; }
  .back {
    display: block;
    margin-top: 16px;
    font-size: 13px;
    color: #94A3B8;
    text-decoration: none;
    transition: color .15s;
  }
  .back:hover { color: #64748B; }
  .contact {
    font-size: 11px;
    color: #CBD5E1;
    margin-top: 28px;
  }
  .contact a { color: #94A3B8; text-decoration: none; }
  .contact a:hover { color: #CBD5E1; }
</style>
</head>
<body>
<div class="card">
  <div class="monogram">JS</div>
  <div class="name">Jerel Smith</div>
  <div class="role">Senior Product Manager Portfolio</div>
  <div class="divider"></div>

  <form method="POST" action="/.netlify/functions/login">
    <!-- Pass destination through so login can redirect back after auth -->
    <input type="hidden" name="next" id="next-field" value="/">

    <div class="label">Password</div>
    <input type="password" name="password" placeholder="Enter password" autofocus autocomplete="current-password">

    <div class="error" id="err-msg">Incorrect password — please try again.</div>

    <button type="submit">View Work Sample</button>
  </form>

  <a href="/" class="back">← Back to portfolio</a>
</div>

<div class="contact">
  Don't have the password? <a href="mailto:ContactJerel@pm.me">ContactJerel@pm.me</a>
</div>

<script>
  // Pull ?next= and ?error= from the URL
  (function(){
    var params = new URLSearchParams(window.location.search);
    var next = params.get('next');
    if(next) document.getElementById('next-field').value = next;
    if(params.get('error')) document.getElementById('err-msg').style.display = 'block';
  }());
</script>
</body>
</html>
